name: Release Theme Package

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.5），留空则从 tag 获取'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install and build
        run: npm i && npm run build

      - name: Determine version
        id: version
        run: |
          # 优先级: workflow_dispatch 输入 > git tag > release tag
          if [ -n "${{ inputs.version }}" ]; then
            CLEAN="${{ inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ]; then
            TAG="${{ github.ref_name }}"
            CLEAN="${TAG#v}"
          else
            CLEAN="0.0.0"
          fi
          echo "version=${CLEAN}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${CLEAN}"

      - name: Update komari-theme.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg version "$VERSION" '.version = $version' komari-theme.json > komari-theme-updated.json
          mv komari-theme-updated.json komari-theme.json
          echo "Updated komari-theme.json version to ${VERSION}"
          cat komari-theme.json

      - name: Verify required files exist
        run: |
          echo "Checking required files..."
          ls -la preview.png || (echo "preview.png not found" && exit 1)
          ls -la komari-theme.json || (echo "komari-theme.json not found" && exit 1)
          ls -la dist/ || (echo "dist/ directory not found" && exit 1)
          echo "All required files found!"

      - name: Create theme package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p theme-package
          cp preview.png theme-package/
          cp komari-theme.json theme-package/
          cp -r dist/ theme-package/
          ZIP_NAME="koma-nezha-theme-v${VERSION}.zip"
          cd theme-package
          zip -r ../${ZIP_NAME} .
          cd ..
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Created package: ${ZIP_NAME}"
          ls -la ${ZIP_NAME}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}